image:
  tag: "01e8d23ceba3c957656d674f155d8f232dff3b3c"
replicaCount: 2
service:
  type: ClusterIP
  port: 3000
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
env:
  - name: LOG_LEVEL
    value: "info"
  - name: ENVIRONMENT
    value: "npn"
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sample-api-npn.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-api-npn-tls
      hosts:
        - sample-api-npn.example.com
