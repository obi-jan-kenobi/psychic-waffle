image:
  tag: 0.1.2
replicaCount: 3
service:
  type: ClusterIP
  port: 3000
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi
env:
  - name: LOG_LEVEL
    value: warn
  - name: ENVIRONMENT
    value: prod
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: '100'
  hosts:
    - host: sample-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-api-tls
      hosts:
        - sample-api.example.com
