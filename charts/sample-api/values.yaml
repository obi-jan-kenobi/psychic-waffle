image:
  registry: ghcr.io
  repository: OWNER/sample-api
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

http:
  port: 3000

env: []
  # - name: LOG_LEVEL
  #   value: "info"

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: sample-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
