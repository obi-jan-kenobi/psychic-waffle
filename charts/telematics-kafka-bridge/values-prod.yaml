# Image tag is pinned here on release promotion (release-please tag or Kargo).
image:
  tag: "0.1.0"

kafka:
  brokers: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9093"
  security:
    enabled: true
    saslMechanism: SCRAM-SHA-512
    saslUser: my-user
    saslPasswordSecret: my-user
    caCertSecret: my-cluster-cluster-ca-cert
