image:
  registry: 514502807230.dkr.ecr.eu-west-1.amazonaws.com
  repository: telematics-kafka-bridge
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 3000

resources: {}

http:
  port: 3000
  pathPrefix: /telematics/mix
  payloadLimit: 10mb

kafka:
  clientId: telematics.kafka-bridge
  brokers: ""
  topics:
    event: event
    position: position
    trip: trip
  security:
    enabled: false
    saslMechanism: SCRAM-SHA-512
    saslUser: ""
    # Secret holding the SASL password under key `password`
    saslPasswordSecret: ""
    # Secret holding the CA cert under key `ca.crt`
    caCertSecret: ""
    caCertMountPath: /ca-cert

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
