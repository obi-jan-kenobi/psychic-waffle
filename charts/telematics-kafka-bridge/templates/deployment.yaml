apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "telematics-kafka-bridge.fullname" . }}
  labels:
    {{- include "telematics-kafka-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "telematics-kafka-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "telematics-kafka-bridge.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port }}
          env:
            - name: HTTP_PORT
              value: {{ .Values.http.port | quote }}
            - name: HTTP_PATH_PREFIX
              value: {{ .Values.http.pathPrefix | quote }}
            - name: HTTP_PAYLOAD_LIMIT
              value: {{ .Values.http.payloadLimit | quote }}
            - name: KAFKA_CLIENT_ID
              value: {{ .Values.kafka.clientId | quote }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: KAFKA_EVENT_OUTPUT_TOPIC
              value: {{ .Values.kafka.topics.event | quote }}
            - name: KAFKA_POSITION_OUTPUT_TOPIC
              value: {{ .Values.kafka.topics.position | quote }}
            - name: KAFKA_TRIP_OUTPUT_TOPIC
              value: {{ .Values.kafka.topics.trip | quote }}
            {{- if .Values.kafka.security.enabled }}
            - name: KAFKA_SSL_CA_FILEPATH
              value: "{{ .Values.kafka.security.caCertMountPath }}/ca.crt"
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.security.saslMechanism | quote }}
            - name: KAFKA_SASL_USER
              value: {{ .Values.kafka.security.saslUser | quote }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.security.saslPasswordSecret }}
                  key: password
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.kafka.security.enabled }}
          volumeMounts:
            - name: ca-cert
              mountPath: {{ .Values.kafka.security.caCertMountPath }}
              readOnly: true
          {{- end }}
      {{- if .Values.kafka.security.enabled }}
      volumes:
        - name: ca-cert
          secret:
            secretName: {{ .Values.kafka.security.caCertSecret }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
