image:
  tag: "0.1.0"

replicaCount: 2

service:
  type: ClusterIP
  port: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

env:
  - name: LOG_LEVEL
    value: "info"
  - name: ENVIRONMENT
    value: "npn"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sample-worker-npn.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sample-worker-npn-tls
      hosts:
        - sample-worker-npn.example.com
