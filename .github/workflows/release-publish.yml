name: Release Publish

# Fires once per published release (release-please tags each app as
# "<app>-v<version>", e.g. sample-api-v0.1.0). The retag gate already created
# the versioned image in GHCR and promoted prod on the tagged commit, so this
# is a verification-only safety net.

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: read # inspect GHCR

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Parse release tag
        id: tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # Tag format: <app>-v<version>
          version="${TAG##*-v}"
          name="${TAG%-v*}"
          if [ "$name" = "$TAG" ] || [ -z "$name" ] || [ -z "$version" ]; then
            echo "Unrecognized tag format: $TAG" >&2
            exit 1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Verifying $name version $version"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release image exists in GHCR
        env:
          NAME: ${{ steps.tag.outputs.name }}
          VERSION: ${{ steps.tag.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          repo="$REGISTRY/$OWNER/$NAME"
          if ! docker buildx imagetools inspect "$repo:$VERSION" >/dev/null 2>&1; then
            echo "$NAME: release image $VERSION missing in GHCR (retag gate did not run?)" >&2
            exit 1
          fi
          echo "$repo:$VERSION present in GHCR ✔"

