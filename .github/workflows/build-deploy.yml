name: Build and Deploy (npn)

# On merge to main: build a Docker image for every changed app, push it to ECR
# tagged with the commit SHA, then update the app's npn image tag to that SHA.

on:
  push:
    branches: [main]
    paths:
      - "apps/**"

concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # commit the npn image tag update back to main
  id-token: write # AWS OIDC

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 514502807230.dkr.ecr.eu-west-1.amazonaws.com

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: Detect changed apps
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="${{ github.sha }}^"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" \
            | grep '^apps/' | cut -d/ -f2 | sort -u || true)
          # Only keep apps that actually have a Dockerfile.
          APPS=()
          for app in $CHANGED; do
            if [ -f "apps/$app/Dockerfile" ]; then
              APPS+=("$app")
            fi
          done
          JSON=$(printf '%s\n' "${APPS[@]}" | grep -v '^$' | jq -R . | jq -cs . || echo '[]')
          echo "apps=$JSON" >> "$GITHUB_OUTPUT"
          echo "Changed apps: $JSON"

  build:
    needs: detect
    if: ${{ needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.app }}" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "${{ matrix.app }}" >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-npn-tag:
    needs: [detect, build]
    if: ${{ needs.detect.outputs.apps != '[]' && needs.detect.outputs.apps != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update npn image tags
        env:
          SHA: ${{ github.sha }}
          APPS: ${{ needs.detect.outputs.apps }}
        run: |
          for app in $(echo "$APPS" | jq -r '.[]'); do
            file="charts/$app/values-npn.yaml"
            [ -f "$file" ] || { echo "skip $file (missing)"; continue; }
            SHA="$SHA" yq -i '.image.tag = strenv(SHA)' "$file"
            echo "Updated $file -> $SHA"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add charts/*/values-npn.yaml
          git commit -m "chore: update npn image tag to ${GITHUB_SHA}"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "Retry push ($i)"
            sleep 3
          done
