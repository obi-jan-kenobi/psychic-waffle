name: Release Retag Gate

# Required check on the release-please PR. Before the PR can be merged this
# retags the npn-referenced image (currently the commit SHA) to the next
# release version in GHCR and points BOTH the npn and prod values at that
# version. Promoting prod here means the commit release-please tags already
# contains the released prod manifest, so prod ArgoCD can pin an immutable
# targetRevision: <app>-v<version>.

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

concurrency:
  group: release-retag-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # update values-npn.yaml / values-prod.yaml on the PR branch
  packages: write # retag images in GHCR

env:
  REGISTRY: ghcr.io

jobs:
  retag:
    # Only run for release-please PRs.
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag images to release version and promote npn + prod values
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          git fetch origin main

          # Iterate over every package release-please manages.
          for name in $(jq -r '.packages | to_entries[] | .value."package-name"' release-please-config.json); do
            chart="charts/$name/Chart.yaml"
            npn="charts/$name/values-npn.yaml"
            prod="charts/$name/values-prod.yaml"
            [ -f "$chart" ] || continue

            pr_version=$(yq -r '.appVersion' "$chart")
            base_version=$(git show origin/main:"$chart" 2>/dev/null | yq -r '.appVersion' || echo "")

            # Only act on apps that are actually being released in this PR.
            if [ "$pr_version" = "$base_version" ]; then
              echo "$name: no version change ($pr_version), skipping"
              continue
            fi

            # The SHA tag currently deployed to npn lives on the base branch.
            sha_tag=$(git show origin/main:"$npn" 2>/dev/null | yq -r '.image.tag' || echo "")
            if [ -z "$sha_tag" ] || [ "$sha_tag" = "null" ]; then
              echo "$name: could not resolve current npn image tag" >&2
              exit 1
            fi

            repo="$REGISTRY/$OWNER/$name"
            echo "$name: retagging $sha_tag -> $pr_version"
            # Server-side manifest copy in GHCR (no layer pull).
            docker buildx imagetools create \
              -t "$repo:$pr_version" "$repo:$sha_tag"

            # Point npn and prod at the released version. Because this commit
            # is what release-please tags on merge, the immutable tag captures
            # the promoted prod manifest.
            PR_VERSION="$pr_version" yq -i '.image.tag = strenv(PR_VERSION)' "$npn"
            [ -f "$prod" ] && PR_VERSION="$pr_version" yq -i '.image.tag = strenv(PR_VERSION)' "$prod"
          done

      - name: Commit version updates to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "npn/prod values already point at the release version"
            exit 0
          fi
          git add charts/*/values-npn.yaml charts/*/values-prod.yaml
          git commit -m "chore: point npn and prod at release version"
          git push origin HEAD:${{ github.head_ref }}
